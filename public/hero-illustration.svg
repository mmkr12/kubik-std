<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101A33"/>
      <stop offset="60%" stop-color="#16234A"/>
      <stop offset="100%" stop-color="#1D2C5C"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8AB0FF"/>
      <stop offset="100%" stop-color="#5C8CFF"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E6BE0"/>
      <stop offset="100%" stop-color="#2457E5"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B4FC7"/>
      <stop offset="100%" stop-color="#1B3AA0"/>
    </linearGradient>
    <linearGradient id="glowTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCE8FF"/>
      <stop offset="100%" stop-color="#9DBBFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5C8CFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5C8CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" rx="28" fill="url(#bg)"/>
  <circle cx="430" cy="300" r="240" fill="url(#glow)"/>

  <!-- изометрический куб: функция рисуется повторно со сдвигом -->
  <!-- нижний слой кубов -->
  <g opacity="0.9">
    <g transform="translate(180,360)">
      <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#leftFace)"/>
      <polygon points="0,-40 70,0 70,80 0,40" fill="url(#leftFace)"/>
      <polygon points="140,-40 70,0 70,80 140,40" fill="url(#rightFace)"/>
    </g>
    <g transform="translate(320,400)">
      <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#topFace)"/>
      <polygon points="0,-40 70,0 70,80 0,40" fill="url(#leftFace)"/>
      <polygon points="140,-40 70,0 70,80 140,40" fill="url(#rightFace)"/>
    </g>
    <g transform="translate(460,360)">
      <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#topFace)"/>
      <polygon points="0,-40 70,0 70,80 0,40" fill="url(#leftFace)"/>
      <polygon points="140,-40 70,0 70,80 140,40" fill="url(#rightFace)"/>
    </g>
  </g>

  <!-- средний слой -->
  <g>
    <g transform="translate(250,260)">
      <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#topFace)"/>
      <polygon points="0,-40 70,0 70,80 0,40" fill="url(#leftFace)"/>
      <polygon points="140,-40 70,0 70,80 140,40" fill="url(#rightFace)"/>
    </g>
    <g transform="translate(390,220)">
      <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#glowTop)"/>
      <polygon points="0,-40 70,0 70,80 0,40" fill="url(#leftFace)"/>
      <polygon points="140,-40 70,0 70,80 140,40" fill="url(#rightFace)"/>
    </g>
  </g>

  <!-- верхний "светящийся" куб — акцент, символ готовой вывески -->
  <g transform="translate(320,120)">
    <polygon points="0,-40 70,-80 140,-40 70,0" fill="url(#glowTop)"/>
    <polygon points="0,-40 70,0 70,80 0,40" fill="url(#topFace)"/>
    <polygon points="140,-40 70,0 70,80 140,40" fill="url(#leftFace)"/>
  </g>

  <!-- лёгкие частицы света -->
  <circle cx="580" cy="150" r="4" fill="#8AB0FF" opacity="0.8"/>
  <circle cx="620" cy="220" r="3" fill="#5C8CFF" opacity="0.6"/>
  <circle cx="160" cy="180" r="3" fill="#8AB0FF" opacity="0.7"/>
  <circle cx="130" cy="260" r="5" fill="#5C8CFF" opacity="0.5"/>
  <circle cx="640" cy="380" r="4" fill="#8AB0FF" opacity="0.6"/>
</svg>
